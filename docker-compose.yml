name: colloc

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  extra_hosts:
    - host.docker.internal:host-gateway
  networks:
    - colloc
  volumes:
    - ${DATA_ROOT}:/srv/data
    - ${CONFIG_ROOT}:/srv/config
    - ${LOG_ROOT}:/srv/logs

services:
  gateway:
    image: nginx:1.27-alpine
    container_name: colloc-gateway
    env_file:
      - .env
    profiles:
      - core
    depends_on:
      webui-backend:
        condition: service_started
      stt:
        condition: service_started
      tools:
        condition: service_started
      tts-router:
        condition: service_started
    command:
      - /bin/sh
      - /workspace/gateway/start.sh
    ports:
      - ${NGINX_HTTP_BIND}:${NGINX_HTTP_PORT}:8080
      - ${NGINX_HTTPS_BIND}:${NGINX_HTTPS_PORT}:8443
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/run
      - /tmp
    networks:
      - colloc
    volumes:
      - ./gateway:/workspace/gateway:ro
      - ./webui/frontend:/usr/share/nginx/html:ro
      - ${EXTERNAL_CERTIFICATE}:/etc/nginx/external-certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  webui-backend:
    <<: *app-service
    container_name: colloc-webui-backend
    profiles:
      - core
    depends_on:
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - webui.backend.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8000/api/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: colloc-redis
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - colloc
    volumes:
      - ${DATA_ROOT}/redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  tools:
    <<: *app-service
    container_name: colloc-tools
    profiles:
      - core
    command:
      - uvicorn
      - services.tools.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8003"
    expose:
      - "8003"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8003/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  stt:
    <<: *app-service
    container_name: colloc-stt
    profiles:
      - core
    command:
      - uvicorn
      - services.stt.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8001/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  tts-router:
    <<: *app-service
    container_name: colloc-tts-router
    profiles:
      - core
      - tts
    depends_on:
      piper-en:
        condition: service_started
      piper-ru:
        condition: service_started
      kokoro:
        condition: service_started
    command:
      - uvicorn
      - services.tts_router.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
    expose:
      - "8002"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8002/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  piper-en:
    <<: *app-service
    container_name: colloc-piper-en
    profiles:
      - core
      - tts
    environment:
      PYTHONPATH: /app
      PIPER_MODEL_DIR: /tmp/piper-models
      PIPER_VOICE: ${PIPER_VOICE_EN}
      PIPER_DEVICE: ${PIPER_DEVICE}
      PIPER_VOICE_BASE_URL: ${PIPER_VOICE_BASE_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0}
    command:
      - uvicorn
      - services.piper.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${PIPER_PORT_EN}"
    expose:
      - ${PIPER_PORT_EN}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${PIPER_PORT_EN}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  piper-ru:
    <<: *app-service
    container_name: colloc-piper-ru
    profiles:
      - core
      - tts
    environment:
      PYTHONPATH: /app
      PIPER_MODEL_DIR: /tmp/piper-models
      PIPER_VOICE: ${PIPER_VOICE_RU}
      PIPER_DEVICE: ${PIPER_DEVICE}
      PIPER_VOICE_BASE_URL: ${PIPER_VOICE_BASE_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0}
    command:
      - uvicorn
      - services.piper.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${PIPER_PORT_RU}"
    expose:
      - ${PIPER_PORT_RU}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${PIPER_PORT_RU}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  kokoro:
    <<: *app-service
    container_name: colloc-kokoro
    profiles:
      - core
      - tts
    environment:
      PYTHONPATH: /app
      KOKORO_MODEL_DIR: /tmp/kokoro-models
      KOKORO_VOICE: ${KOKORO_VOICE}
      KOKORO_MODEL_URL: ${KOKORO_MODEL_URL:-https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx}
      KOKORO_VOICES_URL: ${KOKORO_VOICES_URL:-https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin}
    command:
      - uvicorn
      - services.kokoro.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${KOKORO_PORT}"
    expose:
      - ${KOKORO_PORT}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${KOKORO_PORT}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  asterisk:
    image: andrius/asterisk:latest
    container_name: colloc-asterisk
    restart: "no"
    profiles:
      - sip
    networks:
      - colloc
    volumes:
      - ${DATA_ROOT}/asterisk:/var/lib/asterisk
      - ${LOG_ROOT}/asterisk:/var/log/asterisk
      - ./asterisk/etc/stasis.conf:/etc/asterisk/stasis.conf:ro
    ports:
      - ${ASTERISK_PJSIP_PORT}:${ASTERISK_PJSIP_PORT}/udp
      - ${ASTERISK_RTP_START}-${ASTERISK_RTP_END}:${ASTERISK_RTP_START}-${ASTERISK_RTP_END}/udp
    healthcheck:
      test:
        - CMD-SHELL
        - asterisk -rx 'core show uptime seconds' >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  telegram-bot:
    <<: *app-service
    container_name: colloc-telegram-bot
    profiles:
      - telegram
    command:
      - sh
      - -lc
      - while true; do sleep 3600; done

networks:
  colloc:
    driver: bridge
