name: colloc

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
    VIRTUAL_ENV: /opt/venv
    PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    SYSTEM_LOG_PATH: /srv/logs/system.log
    TMPDIR: /srv/data/tmp
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  extra_hosts:
    - host.docker.internal:host-gateway
  networks:
    - colloc
  volumes:
    - ${DATA_ROOT}:/srv/data
    - ${CONFIG_ROOT}:/srv/config
    - ${LOG_ROOT}:/srv/logs

services:
  gateway:
    image: nginx:1.27-alpine
    container_name: colloc-gateway
    env_file:
      - .env
    profiles:
      - core
    depends_on:
      webui-backend:
        condition: service_healthy
      stt:
        condition: service_started
      tools:
        condition: service_started
      tts-router:
        condition: service_started
    command:
      - /bin/sh
      - /workspace/gateway/start.sh
    ports:
      - ${NGINX_HTTP_BIND}:${NGINX_HTTP_PORT}:8080
      - ${NGINX_HTTPS_BIND}:${NGINX_HTTPS_PORT}:8443
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/run
      - /tmp
    networks:
      - colloc
    volumes:
      - ./gateway:/workspace/gateway:ro
      - ./webui/frontend:/usr/share/nginx/html:ro
      - ${EXTERNAL_CERTIFICATE}:/etc/nginx/external-certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  webui-backend:
    <<: *app-service
    container_name: colloc-webui-backend
    profiles:
      - core
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /opt/venv/bin/uvicorn
      - webui.backend.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8000/api/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: colloc-redis
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - colloc
    volumes:
      - ${DATA_ROOT}/redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  tools:
    <<: *app-service
    container_name: colloc-tools
    profiles:
      - core
    command:
      - /opt/venv/bin/uvicorn
      - services.tools.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8003"
    expose:
      - "8003"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8003/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  stt:
    <<: *app-service
    build:
      context: .
      dockerfile: Dockerfile.stt
    container_name: colloc-stt
    profiles:
      - core
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - /opt/venv/bin/uvicorn
      - services.stt.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8001/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  tts-router:
    <<: *app-service
    container_name: colloc-tts-router
    profiles:
      - core
      - tts
    depends_on:
      piper-en:
        condition: service_started
        required: false
      piper-ru:
        condition: service_started
        required: false
      kokoro:
        condition: service_started
        required: false
      silero:
        condition: service_started
        required: false
    command:
      - /opt/venv/bin/uvicorn
      - services.tts_router.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
    expose:
      - "8002"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8002/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  piper-en:
    <<: *app-service
    container_name: colloc-piper-en
    profiles:
      - tts
      - tts-piper-en
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      PIPER_MODEL_DIR: /srv/data/piper-models/en
      PIPER_VOICE: ${TTS_EN_PRIMARY_VOICE}
      PIPER_DEVICE: ${PIPER_DEVICE}
      PIPER_VOICE_BASE_URL: ${PIPER_VOICE_BASE_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0}
    command:
      - /opt/venv/bin/uvicorn
      - services.piper.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${TTS_EN_PRIMARY_PORT}"
    expose:
      - ${TTS_EN_PRIMARY_PORT}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${TTS_EN_PRIMARY_PORT}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  piper-ru:
    <<: *app-service
    container_name: colloc-piper-ru
    profiles:
      - tts
      - tts-piper-ru
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      PIPER_MODEL_DIR: /srv/data/piper-models/ru
      PIPER_VOICE: ${TTS_RU_PRIMARY_VOICE}
      PIPER_DEVICE: ${PIPER_DEVICE}
      PIPER_VOICE_BASE_URL: ${PIPER_VOICE_BASE_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0}
    command:
      - /opt/venv/bin/uvicorn
      - services.piper.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${TTS_RU_PRIMARY_PORT}"
    expose:
      - ${TTS_RU_PRIMARY_PORT}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${TTS_RU_PRIMARY_PORT}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  kokoro:
    <<: *app-service
    container_name: colloc-kokoro
    profiles:
      - tts
      - tts-kokoro
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      KOKORO_MODEL_DIR: /srv/data/kokoro-models
      KOKORO_VOICE: ${KOKORO_VOICE:-en_US_Emily}
      KOKORO_MODEL_URL: ${KOKORO_MODEL_URL:-https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx}
      KOKORO_VOICES_URL: ${KOKORO_VOICES_URL:-https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin}
    command:
      - /opt/venv/bin/uvicorn
      - services.kokoro.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${KOKORO_PORT:-6030}"
    expose:
      - ${KOKORO_PORT:-6030}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${KOKORO_PORT:-6030}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  silero:
    <<: *app-service
    container_name: colloc-silero
    profiles:
      - tts
      - tts-silero
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      SILERO_MODEL_DIR: /srv/data/silero-models
    command:
      - /opt/venv/bin/uvicorn
      - services.silero.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${SILERO_PORT:-6040}"
    expose:
      - ${SILERO_PORT:-6040}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:$${SILERO_PORT:-6040}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  sip-service:
    <<: *app-service
    container_name: colloc-sip-service
    profiles:
      - sip
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      HF_HOME: /srv/data/huggingface
      XDG_CACHE_HOME: /srv/data/xdg-cache
      STT_MODEL_CACHE_DIR: /srv/data/faster-whisper-models
      SIP_SERVICE_PORT: ${SIP_SERVICE_PORT}
      SIP_DEFAULT_LANGUAGE: ${SIP_DEFAULT_LANGUAGE}
      SIP_ROLE: ${SIP_ROLE}
      SIP_GREETINGS: ${SIP_GREETINGS}
      SIP_MAX_SILENCE: ${SIP_MAX_SILENCE}
      SIP_MAX_DURATION: ${SIP_MAX_DURATION}
      SIP_VAD_THRESHOLD: ${SIP_VAD_THRESHOLD}
      SIP_BARGE_IN_THRESHOLD: ${SIP_BARGE_IN_THRESHOLD}
      SIP_UTTERANCE_MIN_MS: ${SIP_UTTERANCE_MIN_MS}
      SIP_UTTERANCE_END_SILENCE_MS: ${SIP_UTTERANCE_END_SILENCE_MS}
      ASTERISK_HTTP_URL: ${ASTERISK_HTTP_URL}
      ASTERISK_ARI_USER: ${ASTERISK_ARI_USER}
      ASTERISK_ARI_PASSWORD: ${ASTERISK_ARI_PASSWORD}
      STT_URL: http://stt:8001
      TTS_ROUTER_URL: http://tts-router:8002
      LLM_PROVIDER_PRIMARY_BASE_URL: ${LLM_PROVIDER_PRIMARY_BASE_URL}
      LLM_PROVIDER_PRIMARY_MODEL: ${LLM_PROVIDER_PRIMARY_MODEL}
    depends_on:
      redis:
        condition: service_healthy
      stt:
        condition: service_started
      tts-router:
        condition: service_started
    command:
      - /opt/venv/bin/uvicorn
      - services.sip.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${SIP_SERVICE_PORT}"
    expose:
      - ${SIP_SERVICE_PORT}
      - ${SIP_MEDIA_PORT_START}-${SIP_MEDIA_PORT_END}/udp
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:${SIP_SERVICE_PORT}/health >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  sip-ari:
    <<: *app-service
    container_name: colloc-sip-ari
    profiles:
      - sip
    depends_on:
      sip-service:
        condition: service_healthy
      asterisk:
        condition: service_started
    environment:
      PYTHONPATH: /app
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SYSTEM_LOG_PATH: /srv/logs/system.log
      TMPDIR: /srv/data/tmp
      ASTERISK_HTTP_URL: ${ASTERISK_HTTP_URL}
      ASTERISK_ARI_APP: ${ASTERISK_ARI_APP}
      ASTERISK_ARI_USER: ${ASTERISK_ARI_USER}
      ASTERISK_ARI_PASSWORD: ${ASTERISK_ARI_PASSWORD}
      ASTERISK_SIP_SERVICE_URL: ${ASTERISK_SIP_SERVICE_URL}
      SIP_MEDIA_HOST: ${SIP_MEDIA_HOST}
      SIP_MEDIA_PORT_START: ${SIP_MEDIA_PORT_START}
      SIP_MEDIA_PORT_END: ${SIP_MEDIA_PORT_END}
      SIP_DEFAULT_LANGUAGE: ${SIP_DEFAULT_LANGUAGE}
    command:
      - /opt/venv/bin/python
      - services/sip/ari_listener.py

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: colloc-asterisk
    restart: "no"
    profiles:
      - sip
    depends_on:
      sip-service:
        condition: service_healthy
    networks:
      - colloc
    volumes:
      - ${DATA_ROOT}/asterisk:/var/lib/asterisk
      - ${LOG_ROOT}/asterisk:/var/log/asterisk
      - ./asterisk/etc/ari.conf:/etc/asterisk/ari.conf:ro
      - ./asterisk/etc/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk/etc/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/etc/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/etc/stasis.conf:/etc/asterisk/stasis.conf:ro
      - ./asterisk/etc/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk/etc/rtp.conf:/etc/asterisk/rtp.conf:ro
    ports:
      - ${ASTERISK_PJSIP_PORT}:${ASTERISK_PJSIP_PORT}/udp
      - ${ASTERISK_RTP_START}-${ASTERISK_RTP_END}:${ASTERISK_RTP_START}-${ASTERISK_RTP_END}/udp
    healthcheck:
      test:
        - CMD-SHELL
        - asterisk -rx 'core show uptime seconds' >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  telegram-bot:
    <<: *app-service
    container_name: colloc-telegram-bot
    profiles:
      - telegram
    command:
      - sh
      - -lc
      - while true; do sleep 3600; done

networks:
  colloc:
    driver: bridge
