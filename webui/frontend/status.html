<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colloc System Status</title>
    <style>
      :root {
        --bg: #0d1b1e;
        --panel: #10292e;
        --line: #27535a;
        --text: #d7efec;
        --muted: #8db7b1;
        --ok: #5dd39e;
        --bad: #ff7f7f;
        --unknown: #f6d06f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(93, 211, 158, 0.12), transparent 32%),
          linear-gradient(180deg, #081215 0%, var(--bg) 100%);
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 24px 18px 42px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
      }

      .topline {
        color: var(--muted);
        margin-top: 10px;
      }

      .grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 14px;
      }

      .services {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
      }

      .service {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: rgba(0, 0, 0, 0.14);
      }

      .status {
        font-weight: 700;
      }

      .status-ok {
        color: var(--ok);
      }

      .status-down {
        color: var(--bad);
      }

      .status-unknown {
        color: var(--unknown);
      }

      pre {
        white-space: pre-wrap;
        margin: 0;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #bde3df;
      }

      a {
        color: #9be9db;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>System Status</h1>
      <div class="topline" id="heartbeat">Connecting...</div>

      <section class="grid">
        <article class="card">
          <h2>Host Memory (RAM)</h2>
          <pre id="host-memory-ram">Waiting for data...</pre>
        </article>

        <article class="card">
          <h2>GPU Memory (VRAM)</h2>
          <pre id="host-memory-vram">Waiting for data...</pre>
        </article>

        <article class="card">
          <h2>Loaded Models - Ollama</h2>
          <pre id="models-ollama">Waiting for data...</pre>
        </article>

        <article class="card">
          <h2>Loaded Models - Our Services</h2>
          <pre id="models-services">Waiting for data...</pre>
        </article>

        <article class="card">
          <h2>Services health and requests</h2>
          <div class="services" id="services"></div>
        </article>
      </section>

      <p class="topline"><a href="/">Back to main page</a></p>
    </main>

    <script src="/status.js"></script>
  </body>
</html>
