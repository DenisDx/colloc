<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colloc System Test</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --line: #d6c7b4;
        --text: #2b241d;
        --accent: #0f766e;
        --muted: #6b6259;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
          linear-gradient(180deg, #f7f3eb 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        display: grid;
        gap: 16px;
        margin-bottom: 28px;
      }

      .badge {
        width: fit-content;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 0.95;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        padding: 18px;
        box-shadow: 0 14px 40px rgba(43, 36, 29, 0.08);
      }

      .log {
        min-height: 240px;
        white-space: pre-wrap;
        font-family: "Courier New", monospace;
        font-size: 14px;
      }

      button,
      input {
        font: inherit;
      }

      input {
        width: 100%;
        margin-bottom: 10px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
      }

      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      .meta {
        color: var(--muted);
      }

      a {
        color: #0c5e58;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="badge">System test</div>
        <h1>Gateway and backend diagnostics</h1>
        <p class="meta">This page is intended for stack validation and protocol testing.</p>
        <p class="meta"><a href="/">Go to voice interface</a> | <a href="/status.html">Open system status</a></p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Runtime</h2>
          <pre id="runtime" class="log">Loading runtime...</pre>
        </article>
        <article class="card">
          <h2>WebSocket echo</h2>
          <input id="message" type="text" placeholder="Type a message for the backend WebSocket">
          <button id="send" type="button">Send</button>
          <pre id="socket-log" class="log">Connecting...</pre>
        </article>
      </section>
    </main>

    <script src="/system-test.js"></script>
  </body>
</html>
