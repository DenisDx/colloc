[global]
type = global
user_agent = colloc-asterisk
endpoint_identifier_order = auth_username,ip,username,anonymous

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:6060
external_signaling_address = 192.168.1.40
external_media_address = 192.168.1.40
local_net = 172.21.0.0/16

[colloc]
type = endpoint
context = colloc-inbound
disallow = all
allow = ulaw,alaw,opus,g722
transport = transport-udp
aors = colloc
auth = colloc-auth
identify_by = auth_username,username
from_user = colloc
force_rport = yes
rtp_symmetric = yes
rewrite_contact = yes
direct_media = no

; Endpoint without authentication for testing purposes
[test]
type=endpoint
transport=transport-udp
context=from-external
disallow=all
allow=ulaw,alaw
force_rport=yes
rtp_symmetric=yes
direct_media=no

[colloc-auth]
type=auth
auth_type=userpass
username=colloc
password=StrongPass123

[colloc]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

