[global]
type = global
user_agent = colloc-asterisk

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:6060

[colloc-endpoint]
type = endpoint
context = colloc-inbound
disallow = all
allow = ulaw,alaw,opus,g722
transport = transport-udp
aors = colloc-aor
auth = colloc-auth

[colloc-auth]
type = auth
auth_type = userpass
username = colloc
password = change-me

[colloc-aor]
type = aor
max_contacts = 1
