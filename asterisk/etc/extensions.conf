[general]
static = yes
writeprotect = no

; Incoming SIP calls are routed through ARI/Stasis
[colloc-inbound]
exten => 1001,1,NoOp(Routing to internal SIP endpoint 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()
exten => _X.,1,NoOp(Routing to Stasis application)
 same => n,Stasis(colloc-call-handler)
 same => n,Hangup()

; Route registered internal clients (e.g. endpoint 1001) to the same SIP assistant flow
[from-internal]
exten => 1001,1,NoOp(Routing to internal SIP endpoint 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()
exten => _X.,1,Goto(colloc-inbound,${EXTEN},1)

; Route unauthenticated test endpoint to the same flow
[from-external]
exten => _X.,1,Goto(colloc-inbound,${EXTEN},1)

; Fallback dialplan
[colloc-fallback]
exten => _X.,1,NoOp(Fallback handler)
 same => n,Answer()
 same => n,Playback(demo-thanks-for-calling)
 same => n,Hangup()
