[general]
static = yes
writeprotect = no

[globals]
COLLOC_RING_TIMEOUT = 120

[internal-users]
exten => 100,1,NoOp(Route to AI assistant)
 same => n,Stasis(colloc-call-handler)
 same => n,Hangup()
exten => 1000,1,Goto(internal-users,100,1)
exten => 1001,1,NoOp(Route to SIP endpoint 1001)
 same => n,Dial(PJSIP/1001,${COLLOC_RING_TIMEOUT})
 same => n,Hangup()
exten => 1002,1,NoOp(Route to SIP endpoint 1002)
 same => n,Dial(PJSIP/1002,${COLLOC_RING_TIMEOUT})
 same => n,Hangup()

[colloc-inbound]
exten => 100,1,NoOp(Route external call to AI assistant)
 same => n,Goto(internal-users,100,1)
exten => _X.,1,NoOp(Route unmatched call to AI assistant)
 same => n,Goto(internal-users,100,1)

[from-internal]
include => internal-users
exten => 1000,1,Goto(internal-users,1000,1)
exten => 1001,1,Goto(internal-users,1001,1)
exten => 1002,1,Goto(internal-users,1002,1)
exten => _X.,1,Goto(colloc-inbound,${EXTEN},1)

[from-external]
exten => 1000,1,Goto(internal-users,1000,1)
exten => 1001,1,Goto(internal-users,1001,1)
exten => 1002,1,Goto(internal-users,1002,1)
exten => _X.,1,Goto(colloc-inbound,${EXTEN},1)

[zadarma-in]
exten => 1004,1,Verbose(1, Zadarma incoming call from ${CALLERID(num)})
 same => n,Goto(internal-users,100,1)
 same => n,Hangup()